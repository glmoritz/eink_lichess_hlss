# HLSS debug deployment.
#   Build : docker compose -f deploy/docker-compose.yml build
#   Run   : docker compose -f deploy/docker-compose.yml up -d
#
# Uses host networking so the service binds its port directly on the host,
# resolves postgres.tutu.lan, and can reach LLSS at pccasa.tutu.lan:8008.
# Config (port, DB URL, LLSS_BASE_URL, keys) comes from the repo .env.
name: eink-hlss
services:
  hlss:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: eink-hlss:debug
    container_name: eink-hlss
    restart: unless-stopped
    env_file:
      - ../.env
    # The LLSS DB registers HLSS at moritzpc.tutu.lan:8000/api, so serve on 8000
    # (overrides the stale PORT=8001 in .env; the app mounts routes under /api).
    environment:
      - PORT=8000
    network_mode: host
